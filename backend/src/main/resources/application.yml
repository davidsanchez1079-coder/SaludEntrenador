server:
  port: 8080

spring:
  application:
    name: SaludEntrenador

  datasource:
    url: jdbc:h2:mem:saludentrenador;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: false

# OpenAI API
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  max-tokens: 1000
