server:
  port: ${PORT:8080}

spring:
  application:
    name: SaludEntrenador

  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/saludentrenador;DB_CLOSE_DELAY=-1}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

  h2:
    console:
      enabled: false

# OpenAI API
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  max-tokens: 4096
