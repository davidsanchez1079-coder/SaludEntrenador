server:
  port: ${PORT:8080}

spring:
  application:
    name: SaludEntrenador

  # ===== PERFIL DEFAULT: H2 en archivo (desarrollo local) =====
  datasource:
    url: jdbc:h2:file:./data/saludentrenador
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# OpenAI API
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  max-tokens: 2000

---
# ===== PERFIL PROD: PostgreSQL (Railway, etc) =====
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER}
    password: ${PGPASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false
