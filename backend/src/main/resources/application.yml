server:
  port: 8080

spring:
  application:
    name: SaludEntrenador

  datasource:
    url: jdbc:h2:mem:saludentrenador
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# Anthropic Claude API
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-20250514
  max-tokens: 2000
