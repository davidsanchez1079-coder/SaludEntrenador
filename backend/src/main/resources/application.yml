server:
  port: 8080

spring:
  application:
    name: SaludEntrenador

  datasource:
    url: jdbc:h2:mem:saludentrenador
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# OpenAI API
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  max-tokens: 2000
